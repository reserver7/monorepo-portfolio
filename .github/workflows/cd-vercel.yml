name: CD - Vercel

on:
  push:
    branches: ["main"]
    paths:
      - "apps/docs/**"
      - "apps/whiteboard/**"
      - "packages/shared-client/**"
      - "packages/shared-types/**"
      - "packages/ui/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/cd-vercel.yml"
  workflow_dispatch:

concurrency:
  group: cd-vercel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      whiteboard: ${{ steps.filter.outputs.whiteboard }}
      shared: ${{ steps.filter.outputs.shared }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - "packages/shared-client/**"
              - "packages/shared-types/**"
              - "packages/ui/**"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "turbo.json"
            docs:
              - "apps/docs/**"
              - ".github/workflows/cd-vercel.yml"
            whiteboard:
              - "apps/whiteboard/**"
              - ".github/workflows/cd-vercel.yml"

  deploy-docs:
    name: Deploy Docs (Vercel)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.docs == 'true' || needs.detect-changes.outputs.shared == 'true' }}
    timeout-minutes: 25

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          [ -n "${VERCEL_TOKEN}" ] || { echo "Missing secret: VERCEL_TOKEN"; exit 1; }
          [ -n "${VERCEL_ORG_ID}" ] || { echo "Missing secret: VERCEL_ORG_ID"; exit 1; }
          [ -n "${VERCEL_PROJECT_ID}" ] || { echo "Missing secret: VERCEL_PROJECT_ID_DOCS"; exit 1; }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information (Docs)
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Docs
        run: pnpm dlx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Docs
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"

  deploy-whiteboard:
    name: Deploy Whiteboard (Vercel)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.whiteboard == 'true' || needs.detect-changes.outputs.shared == 'true' }}
    timeout-minutes: 25

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WHITEBOARD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          [ -n "${VERCEL_TOKEN}" ] || { echo "Missing secret: VERCEL_TOKEN"; exit 1; }
          [ -n "${VERCEL_ORG_ID}" ] || { echo "Missing secret: VERCEL_ORG_ID"; exit 1; }
          [ -n "${VERCEL_PROJECT_ID}" ] || { echo "Missing secret: VERCEL_PROJECT_ID_WHITEBOARD"; exit 1; }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information (Whiteboard)
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Whiteboard
        run: pnpm dlx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Whiteboard
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
