name: CD - Vercel (Release Tag)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "배포할 릴리스 태그 (예: v1.2.3)"
        required: true
        type: string

concurrency:
  group: cd-vercel-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-tag-on-main:
    name: Verify Release Tag Commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_sha: ${{ steps.resolve-release.outputs.release_sha }}
      release_tag: ${{ steps.resolve-release.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag and ensure commit belongs to main
        id: resolve-release
        env:
          MANUAL_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            release_sha="${GITHUB_SHA}"
          else
            release_tag="$(printf '%s' "${MANUAL_RELEASE_TAG}" | xargs)"
            if [ -z "${release_tag}" ]; then
              echo "release_tag 입력값이 비어 있습니다."
              exit 1
            fi
            git fetch --force --tags origin
            if ! git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
              echo "태그를 찾을 수 없습니다: ${release_tag}"
              exit 1
            fi
            release_sha="$(git rev-list -n 1 "refs/tags/${release_tag}")"
          fi

          git fetch --no-tags origin main --depth=1
          if ! git merge-base --is-ancestor "${release_sha}" "origin/main"; then
            echo "릴리스 태그는 main 이력 위 커밋만 허용됩니다: ${release_tag} (${release_sha})"
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"
          echo "검증 완료: ${release_tag} -> ${release_sha}"

  deploy-docs:
    name: Deploy Docs (Vercel Production)
    runs-on: ubuntu-latest
    needs: verify-tag-on-main
    timeout-minutes: 25

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-tag-on-main.outputs.release_sha }}

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          [ -n "${VERCEL_TOKEN}" ] || { echo "Missing secret: VERCEL_TOKEN"; exit 1; }
          [ -n "${VERCEL_ORG_ID}" ] || { echo "Missing secret: VERCEL_ORG_ID"; exit 1; }
          [ -n "${VERCEL_PROJECT_ID}" ] || { echo "Missing secret: VERCEL_PROJECT_ID_DOCS"; exit 1; }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information (Docs)
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Docs
        run: pnpm dlx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Docs
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"

  deploy-whiteboard:
    name: Deploy Whiteboard (Vercel Production)
    runs-on: ubuntu-latest
    needs: verify-tag-on-main
    timeout-minutes: 25

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WHITEBOARD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-tag-on-main.outputs.release_sha }}

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          [ -n "${VERCEL_TOKEN}" ] || { echo "Missing secret: VERCEL_TOKEN"; exit 1; }
          [ -n "${VERCEL_ORG_ID}" ] || { echo "Missing secret: VERCEL_ORG_ID"; exit 1; }
          [ -n "${VERCEL_PROJECT_ID}" ] || { echo "Missing secret: VERCEL_PROJECT_ID_WHITEBOARD"; exit 1; }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information (Whiteboard)
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Whiteboard
        run: pnpm dlx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Whiteboard
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
