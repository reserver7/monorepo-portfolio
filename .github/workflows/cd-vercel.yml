name: CD - Vercel (Release Tag)

on:
  push:
    tags: ["collab-v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "배포할 릴리스 태그 (예: v1.2.3)"
        required: true
        type: string

concurrency:
  group: cd-vercel-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-tag-on-main:
    uses: ./.github/workflows/_verify-release-tag.yml
    with:
      release_tag: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.release_tag }}

  deploy-collab-web:
    name: Deploy Collab Web (Vercel Production)
    runs-on: ubuntu-latest
    needs: verify-tag-on-main
    timeout-minutes: 25

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_COLLAB_WEB || secrets.VERCEL_PROJECT_ID_DOCS }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-tag-on-main.outputs.release_sha }}

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          [ -n "${VERCEL_TOKEN}" ] || { echo "Missing secret: VERCEL_TOKEN"; exit 1; }
          [ -n "${VERCEL_ORG_ID}" ] || { echo "Missing secret: VERCEL_ORG_ID"; exit 1; }
          [ -n "${VERCEL_PROJECT_ID}" ] || { echo "Missing secret: VERCEL_PROJECT_ID_COLLAB_WEB (or VERCEL_PROJECT_ID_DOCS fallback)"; exit 1; }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information (Collab Web)
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Collab Web
        run: pnpm dlx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Collab Web
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
