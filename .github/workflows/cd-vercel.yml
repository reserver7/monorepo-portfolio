name: CD - Vercel (Release Tag)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: cd-vercel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-tag-on-main:
    name: Verify Release Tag Commit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit belongs to main
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main --depth=1
          if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag commit is on main."
            exit 0
          fi

          echo "Release tag must point to a commit on main."
          exit 1

  deploy-docs:
    name: Deploy Docs (Vercel Production)
    runs-on: ubuntu-latest
    needs: verify-tag-on-main
    timeout-minutes: 25

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          [ -n "${VERCEL_TOKEN}" ] || { echo "Missing secret: VERCEL_TOKEN"; exit 1; }
          [ -n "${VERCEL_ORG_ID}" ] || { echo "Missing secret: VERCEL_ORG_ID"; exit 1; }
          [ -n "${VERCEL_PROJECT_ID}" ] || { echo "Missing secret: VERCEL_PROJECT_ID_DOCS"; exit 1; }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information (Docs)
        working-directory: apps/docs
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Docs
        working-directory: apps/docs
        run: pnpm dlx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Docs
        working-directory: apps/docs
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"

  deploy-whiteboard:
    name: Deploy Whiteboard (Vercel Production)
    runs-on: ubuntu-latest
    needs: verify-tag-on-main
    timeout-minutes: 25

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WHITEBOARD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          [ -n "${VERCEL_TOKEN}" ] || { echo "Missing secret: VERCEL_TOKEN"; exit 1; }
          [ -n "${VERCEL_ORG_ID}" ] || { echo "Missing secret: VERCEL_ORG_ID"; exit 1; }
          [ -n "${VERCEL_PROJECT_ID}" ] || { echo "Missing secret: VERCEL_PROJECT_ID_WHITEBOARD"; exit 1; }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information (Whiteboard)
        working-directory: apps/whiteboard
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Whiteboard
        working-directory: apps/whiteboard
        run: pnpm dlx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy Whiteboard
        working-directory: apps/whiteboard
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
