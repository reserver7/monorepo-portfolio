name: _Turbo Scope Checks

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      pre_commands:
        required: false
        type: string
        default: ""
      lint_command:
        required: true
        type: string
      typecheck_command:
        required: true
        type: string
      build_command:
        required: true
        type: string

permissions:
  contents: read

jobs:
  run:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre Commands
        if: ${{ inputs.pre_commands != '' }}
        run: ${{ inputs.pre_commands }}

      - name: Lint
        run: ${{ inputs.lint_command }}

      - name: Typecheck
        run: ${{ inputs.typecheck_command }}

      - name: Build
        run: ${{ inputs.build_command }}
